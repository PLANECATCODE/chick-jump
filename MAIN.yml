name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: g++ -std=c++17 *.cpp *.cxx *.c++ -o ChickJump.exe 2>nul || g++ -std=c++17 *.cc -o ChickJump.exe 2>nul || echo "No C++ file found"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ChickJump
          path: ChickJump.exe
